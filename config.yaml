# F1 Strategy Lab Configuration

# Data paths
data:
  raw_dir: data/raw
  processed_dir: data/processed
  features_dir: data/features

# Model settings
model:
  random_state: 42
  test_size: 0.2
  cv_folds: 5

# Simulation settings
simulation:
  lap_time_variance: 0.02
  tire_degradation_rate: 0.001
  fuel_consumption_per_lap: 1.0

# API settings
api:
  host: 0.0.0.0
  port: 8000
  debug: false

# Logging
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
